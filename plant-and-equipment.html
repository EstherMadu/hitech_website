<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

  <title>Hitech Plant And Equipment | Hitech Construction Company Limited</title>
  <meta name="description" content="Explore Hitech Construction Company Limited's plant and equipment operations.">
  <script>
    (function () {
      const storedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = storedTheme || "auto";
      const resolvedTheme = theme === "auto" ? (prefersDark ? "dark" : "light") : theme;
      document.documentElement.setAttribute("data-bs-theme", resolvedTheme);
      document.documentElement.dataset.themePreference = theme;
    }());
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/vendor-style.css">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>

  </main>
